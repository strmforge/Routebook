<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>路书 · 你说去哪，路它来问</title>
<link rel="icon" type="image/png" href="assets/icons/icon-32.png">
<style>
  :root {
    --bg: #f7f5f0;
    --panel: #ffffff;
    --ink: #2b2a28;
    --ink-soft: #8a857c;
    --line: #e7e2d8;
    --accent: #b3552e;
    --accent-soft: #fdf0e9;
    --confirmed: #2b2a28;
    --guessed: #a39c8f;
    --guessed-label: " （猜的）";
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: var(--bg); color: var(--ink);
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 14px 28px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 14px; background: var(--panel);
  }
  .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 10px; display: block;
    box-shadow: inset 0 0 0 1px var(--line);
  }
  .brand-copy { display: flex; align-items: baseline; gap: 14px; min-width: 0; }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: 1px; white-space: nowrap; }
  header .sub { font-size: 13px; color: var(--ink-soft); }
  header .right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .status { font-size: 12px; color: var(--ink-soft); }
  .status.done { color: var(--accent); font-weight: 600; }
  .model-pill {
    border: 1px solid var(--line); background: var(--accent-soft); color: var(--accent);
    padding: 5px 10px; border-radius: 999px; font-size: 12px; cursor: pointer;
    max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .model-pill:hover { border-color: var(--accent); }
  button.ghost {
    border: 1px solid var(--line); background: none; color: var(--ink-soft);
    padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer;
  }
  button.ghost:hover { color: var(--ink); border-color: var(--ink-soft); }

  main { flex: 1; display: flex; min-height: 0; }

  /* 左侧聊天窗口 */
  .projects {
    width: 230px; min-width: 210px; border-right: 1px solid var(--line);
    background: #f1eee7; display: flex; flex-direction: column; min-height: 0;
  }
  .projects-head {
    padding: 16px 14px 10px; display: flex; align-items: center; gap: 8px;
  }
  .projects-head b { font-size: 13px; color: var(--ink-soft); letter-spacing: 1px; }
  .projects-head button {
    margin-left: auto; border: 1px solid var(--line); background: #fff; color: var(--accent);
    width: 28px; height: 28px; border-radius: 8px; font-size: 18px; line-height: 1; cursor: pointer;
  }
  .project-list { flex: 1; overflow-y: auto; padding: 0 10px 12px; }
  .project-item {
    width: 100%; border: 1px solid transparent; background: transparent; color: var(--ink);
    text-align: left; border-radius: 10px; padding: 10px 10px; margin-bottom: 6px; cursor: pointer;
  }
  .project-item.active { background: var(--panel); border-color: var(--accent); }
  .project-item b {
    display: block; font-size: 14px; font-weight: 600; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; margin-bottom: 3px;
  }
  .project-item span {
    display: block; font-size: 12px; color: var(--ink-soft); overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .project-actions { padding: 10px; border-top: 1px solid var(--line); display: flex; gap: 8px; }
  .project-actions button {
    flex: 1; border: 1px solid var(--line); background: #fff; color: var(--ink-soft);
    border-radius: 8px; padding: 7px 4px; font-size: 12px; cursor: pointer;
  }
  .project-actions button:hover { color: var(--ink); }

  /* 左：聊天 */
  .chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .msgs { flex: 1; overflow-y: auto; padding: 26px 30px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 78%; padding: 12px 16px; border-radius: 14px; font-size: 15px; line-height: 1.75; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: var(--panel); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .msg.thinking { color: var(--ink-soft); font-style: normal; }
  .msg.thinking::after { content: ''; animation: dots 1.4s steps(4, end) infinite; }
  @keyframes dots { 0% { content: ''; } 25% { content: '·'; } 50% { content: '· ·'; } 75% { content: '· · ·'; } }

  .composer { padding: 16px 30px 22px; display: flex; gap: 10px; border-top: 1px solid var(--line); background: var(--panel); }
  .composer textarea {
    flex: 1; resize: none; border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 14px; font-size: 15px; font-family: inherit; line-height: 1.6;
    height: 52px; outline: none; background: var(--bg);
  }
  .composer textarea:focus { border-color: var(--accent); background: #fff; }
  .composer button.send {
    border: none; background: var(--accent); color: #fff; border-radius: 12px;
    padding: 0 22px; font-size: 15px; cursor: pointer;
  }
  .composer button.send:disabled { opacity: .4; cursor: default; }

  /* 右：活文档 */
  .doc {
    width: 42%; min-width: 360px; border-left: 1px solid var(--line);
    background: var(--panel); overflow-y: auto; padding: 26px 28px;
  }
  .doc h2 { font-size: 17px; font-weight: 600; margin-bottom: 4px; min-height: 24px; }
  .doc .legend { font-size: 12px; color: var(--ink-soft); margin-bottom: 18px; }
  .doc .legend i { font-style: normal; color: var(--guessed); }
  .sec { margin-bottom: 18px; }
  .sec h3 {
    font-size: 13px; color: var(--ink-soft); font-weight: 600;
    letter-spacing: 2px; margin-bottom: 7px; padding-bottom: 4px; border-bottom: 1px solid var(--line);
  }
  .sec ul { list-style: none; }
  .sec li { font-size: 14px; line-height: 1.7; padding: 3px 0 3px 12px; border-left: 3px solid transparent; }
  .sec li.confirmed { color: var(--confirmed); border-left-color: var(--accent); }
  .sec li.guessed { color: var(--guessed); border-left-color: var(--line); }
  .sec li.guessed::after { content: var(--guessed-label); font-size: 12px; }
  .sec .empty { color: #cfc9bd; font-size: 13px; padding-left: 12px; }
  .flash { animation: flash 1.2s ease-out; }
  @keyframes flash { 0% { background: var(--accent-soft); } 100% { background: transparent; } }

  /* 收尾区 */
  .finale { margin-top: 8px; padding: 16px; background: var(--accent-soft); border-radius: 12px; display: none; }
  .finale.show { display: block; }
  .finale p { font-size: 14px; margin-bottom: 10px; }
  .finale button {
    border: none; background: var(--accent); color: #fff; border-radius: 10px;
    padding: 10px 18px; font-size: 14px; cursor: pointer;
  }
  .finale button:disabled { opacity: .5; }

  /* 计划书弹层 */
  .plan-view {
    position: fixed; inset: 0; background: rgba(43,42,40,.45); display: none;
    align-items: center; justify-content: center; padding: 30px;
  }
  .plan-view.show { display: flex; }
  .plan-card {
    background: #fff; border-radius: 16px; width: min(760px, 100%); max-height: 88vh;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .plan-card .bar { padding: 14px 22px; border-bottom: 1px solid var(--line); display: flex; gap: 10px; align-items: center; }
  .plan-card .bar b { font-size: 15px; }
  .plan-card .bar .right { margin-left: auto; display: flex; gap: 8px; }
  .plan-card .bar button { border: 1px solid var(--line); background: none; padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; }
  .plan-card .bar button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .plan-body { overflow-y: auto; padding: 26px 32px; font-size: 15px; line-height: 1.9; }
  .plan-body h1 { font-size: 22px; margin: 0 0 14px; }
  .plan-body h2 { font-size: 17px; margin: 22px 0 8px; }
  .plan-body h3 { font-size: 15px; margin: 16px 0 6px; }
  .plan-body ul, .plan-body ol { padding-left: 22px; margin: 6px 0; }
  .plan-body p { margin: 8px 0; }
  .plan-body strong { color: var(--accent); }

  /* 模型设置 */
  .model-view {
    position: fixed; inset: 0; background: rgba(43,42,40,.45); display: none;
    align-items: center; justify-content: center; padding: 30px; z-index: 3;
  }
  .model-view.show { display: flex; }
  .model-card {
    width: min(760px, 100%); max-height: 88vh; overflow: hidden;
    background: #fff; border-radius: 16px; display: flex; flex-direction: column;
  }
  .model-card .bar {
    padding: 14px 22px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
  }
  .model-card .bar b { font-size: 15px; }
  .model-card .bar .right { margin-left: auto; display: flex; gap: 8px; }
  .model-card .bar button, .model-actions button {
    border: 1px solid var(--line); background: none; padding: 7px 14px;
    border-radius: 8px; font-size: 13px; cursor: pointer;
  }
  .model-card .bar button.primary, .model-actions button.primary {
    border-color: var(--accent); background: var(--accent); color: #fff;
  }
  .model-body {
    display: grid; grid-template-columns: 240px 1fr; min-height: 480px; overflow: hidden;
  }
  .model-list {
    border-right: 1px solid var(--line); background: #faf8f3; padding: 14px;
    overflow-y: auto;
  }
  .model-item {
    width: 100%; text-align: left; border: 1px solid transparent; background: transparent;
    padding: 10px 12px; border-radius: 10px; cursor: pointer; margin-bottom: 8px;
    color: var(--ink);
  }
  .model-item.active { border-color: var(--accent); background: var(--accent-soft); }
  .model-item b { display: block; font-size: 14px; margin-bottom: 3px; }
  .model-item span { display: block; font-size: 12px; color: var(--ink-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .model-form { padding: 18px 22px; overflow-y: auto; }
  .model-form label { display: block; font-size: 13px; color: var(--ink-soft); margin: 13px 0 6px; }
  .model-form input, .model-form select {
    width: 100%; border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; font: inherit; outline: none; background: var(--bg);
  }
  .model-form input:focus, .model-form select:focus { border-color: var(--accent); background: #fff; }
  .model-note { margin-top: 12px; padding: 12px 14px; background: var(--accent-soft); border-radius: 10px; font-size: 13px; line-height: 1.7; color: var(--ink-soft); }
  .model-actions { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .preset-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin: 8px 0 14px; }
  .preset-grid button {
    border: 1px solid var(--line); background: #faf8f3; color: var(--ink);
    border-radius: 10px; padding: 10px 12px; text-align: left; cursor: pointer;
  }
  .preset-grid button:hover { border-color: var(--accent); background: var(--accent-soft); }
  .preset-grid b { display: block; font-size: 13px; margin-bottom: 3px; }
  .preset-grid span { display: block; font-size: 12px; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* 通用设置 */
  .settings-view {
    position: fixed; inset: 0; background: rgba(43,42,40,.45); display: none;
    align-items: center; justify-content: center; padding: 30px; z-index: 4;
  }
  .settings-view.show { display: flex; }
  .settings-card {
    width: min(680px, 100%); max-height: 88vh; overflow: hidden;
    background: #fff; border-radius: 16px; display: flex; flex-direction: column;
  }
  .settings-card .bar {
    padding: 14px 22px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
  }
  .settings-card .bar b { font-size: 15px; }
  .settings-card .bar .right { margin-left: auto; display: flex; gap: 8px; }
  .settings-card .bar button {
    border: 1px solid var(--line); background: none; padding: 7px 14px;
    border-radius: 8px; font-size: 13px; cursor: pointer;
  }
  .settings-body { padding: 22px; overflow-y: auto; }
  .settings-section { margin-bottom: 24px; }
  .settings-section h3 {
    font-size: 13px; color: var(--ink-soft); font-weight: 600;
    letter-spacing: 1px; margin-bottom: 10px;
  }
  .language-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
  .language-option {
    border: 1px solid var(--line); background: var(--bg); border-radius: 10px;
    padding: 10px; text-align: left; cursor: pointer; color: var(--ink);
  }
  .language-option.active { border-color: var(--accent); background: var(--accent-soft); }
  .language-option b, .name-row b { display: block; font-size: 14px; margin-bottom: 3px; }
  .language-option span, .name-row span { display: block; font-size: 12px; color: var(--ink-soft); }
  .name-list { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
  .name-row { border: 1px solid var(--line); border-radius: 10px; padding: 10px; background: #faf8f3; display: flex; gap: 10px; align-items: center; }
  .name-row img { width: 32px; height: 32px; border-radius: 9px; flex: 0 0 auto; }
  .about-text { font-size: 14px; line-height: 1.8; color: var(--ink); }
  .about-text p + p { margin-top: 8px; color: var(--ink-soft); }
  .info-list { display: grid; gap: 8px; }
  .info-row {
    border: 1px solid var(--line); border-radius: 10px; background: #faf8f3;
    padding: 10px 12px; min-width: 0;
  }
  .info-row b { display: block; font-size: 12px; color: var(--ink-soft); margin-bottom: 4px; }
  .info-row code {
    display: block; font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .settings-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .settings-actions button {
    border: 1px solid var(--accent); background: var(--accent); color: #fff;
    border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer;
  }
  .backup-note { margin-top: 10px; font-size: 13px; line-height: 1.7; color: var(--ink-soft); }

  @media (max-width: 780px) {
    header { align-items: flex-start; flex-wrap: wrap; }
    header .right { width: 100%; margin-left: 0; flex-wrap: wrap; }
    .language-grid, .name-list { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <img class="brand-mark" src="assets/logo-mark.svg" alt="" aria-hidden="true">
    <div class="brand-copy">
      <h1 id="appName">路书</h1>
      <span class="sub" id="tagline">你说去哪，路它来问</span>
    </div>
  </div>
  <div class="right">
    <span class="status" id="status">随便说说你想做什么，哪怕只有一句话</span>
    <button class="model-pill" id="modelPill" onclick="openModelView()">大脑：未设置</button>
    <button class="ghost" id="settingsBtn" onclick="openSettingsView()">设置</button>
    <button class="ghost" id="newWindowTopBtn" onclick="newProject()">新建窗口</button>
  </div>
</header>

<main>
  <aside class="projects">
    <div class="projects-head">
      <b id="windowListTitle">聊天窗口</b>
      <button id="newWindowSideBtn" title="新建聊天窗口" onclick="newProject()">+</button>
    </div>
    <div class="project-list" id="projectList"></div>
    <div class="project-actions">
      <button onclick="renameProject()">改名</button>
      <button onclick="deleteProject()">删除</button>
    </div>
  </aside>

  <section class="chat">
    <div class="msgs" id="msgs"></div>
    <div class="composer">
      <textarea id="input" placeholder="比如：我想搞个副业 / 我想给爸妈装修老房子 / 我想做个小工具……" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
      <button class="send" id="sendBtn" onclick="send()">说</button>
    </div>
  </section>

  <aside class="doc">
    <h2 id="docTitle">（还没有名字的计划）</h2>
    <div class="legend" id="legendText">左边带<span style="color:var(--accent)">橙线</span>的是你确认过的；<i>灰色带"猜的"</i>是它的推测，说句话就能纠正</div>
    <div id="sections"></div>
    <div class="finale" id="finale">
      <p id="finaleText">想法已经聊清楚了。</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button id="planBtn" onclick="makePlan()">生成计划书</button>
        <button id="specBtn" onclick="makeSpec()" style="display:none">生成给 AI 的任务书</button>
      </div>
    </div>
  </aside>
</main>

<div class="plan-view" id="planView">
  <div class="plan-card">
    <div class="bar">
      <b id="docKind">计划书</b>
      <div class="right">
        <button onclick="copyPlan()" id="copyBtn">复制全文</button>
        <button class="primary" onclick="downloadPlan()">保存到电脑</button>
        <button id="closePlanBtn" onclick="document.getElementById('planView').classList.remove('show')">收起</button>
      </div>
    </div>
    <div class="plan-body" id="planBody"></div>
  </div>
</div>

<div class="model-view" id="modelView">
  <div class="model-card">
    <div class="bar">
      <b id="modelSettingsTitle">大脑设置</b>
      <div class="right">
        <button id="addBrainBtn" onclick="addOpenAIModel()">添加大脑</button>
        <button class="primary" id="saveModelBtn" onclick="saveModelsFromView()">保存</button>
        <button id="closeModelBtn" onclick="closeModelView()">收起</button>
      </div>
    </div>
    <div class="model-body">
      <div class="model-list" id="modelList"></div>
      <div class="model-form">
        <label id="presetTitle">常用预设</label>
        <div class="preset-grid" id="presetGrid"></div>

        <label>名称</label>
        <input id="modelName" placeholder="比如：DeepSeek / Kimi / 本地 Ollama">

        <label>类型</label>
        <select id="modelProvider" onchange="renderModelFields()">
          <option value="openai-compatible">兼容 OpenAI 的接口</option>
        </select>

        <div id="openaiFields">
          <label>接口地址</label>
          <input id="modelBaseUrl" placeholder="例如：https://api.deepseek.com/v1">

          <label>密钥</label>
          <input id="modelApiKey" type="password" placeholder="留空表示保留原来的密钥">
        </div>

        <label>模型名</label>
        <input id="modelModel" placeholder="例如：deepseek-v4-pro / MiniMax-M2.7 / mimo-v2.5">

        <div class="model-actions">
          <button class="primary" onclick="setActiveModel()">设为当前大脑</button>
          <button onclick="removeModel()">删除这个大脑</button>
        </div>
        <div class="model-note">路书自己不开车，只租用一个大脑来帮你反问和写任务书。添加 DeepSeek、Kimi、Ollama、OpenAI 等兼容 OpenAI 接口的服务后，就可以开始使用。</div>
      </div>
    </div>
  </div>
</div>

<div class="settings-view" id="settingsView">
  <div class="settings-card">
    <div class="bar">
      <b id="settingsTitle">设置</b>
      <div class="right">
        <button id="closeSettingsBtn" onclick="closeSettingsView()">收起</button>
      </div>
    </div>
    <div class="settings-body">
      <div class="settings-section">
        <h3 id="languageTitle">语言</h3>
        <div class="language-grid" id="languageGrid"></div>
      </div>
      <div class="settings-section">
        <h3 id="namesTitle">路书在不同语言里的名字</h3>
        <div class="name-list" id="nameList"></div>
      </div>
      <div class="settings-section">
        <h3 id="aboutTitle">关于路书</h3>
        <div class="about-text" id="aboutText"></div>
      </div>
      <div class="settings-section">
        <h3 id="dataTitle">数据和备份</h3>
        <div class="info-list" id="appInfoList"></div>
        <div class="settings-actions">
          <button id="exportBackupBtn" onclick="exportBackup()">导出备份</button>
        </div>
        <div class="backup-note" id="backupNote">备份只包含聊天窗口、计划书和任务书，不包含模型密钥。</div>
      </div>
    </div>
  </div>
</div>

<script>
const SECTIONS = ['目标','成功标准','约束','资源','风险','依赖','非目标'];
const LANGUAGE_KEY = 'lushu_language_v1';
const LANGUAGES = [
  { code: 'zh', native: '中文', label: 'Chinese' },
  { code: 'en', native: 'English', label: 'English' },
  { code: 'ja', native: '日本語', label: 'Japanese' },
  { code: 'ko', native: '한국어', label: 'Korean' },
];
const APP_NAMES = {
  zh: { language: '中文', name: '路书', note: '把想去的地方问成一条能走的路' },
  en: { language: 'English', name: 'Routebook', note: 'Turns a rough idea into a route you can follow' },
  ja: { language: '日本語', name: '道しるべ', note: 'ぼんやりした思いつきを進める道筋にする' },
  ko: { language: '한국어', name: '길잡이', note: '흐릿한 생각을 따라갈 수 있는 길로 정리합니다' },
};

function normalizeWindowFromServer(win){
  return Object.assign(emptyWindowState(), win || {});

function normalizeIndexFromServer(index){
  const windows = Array.isArray(index && index.windows) ? index.windows : [];
  return {
    activeProjectId: (index && index.activeWindowKey) || (windows[0] && windows[0].windowKey) || '',
    projects: windows.map(w => ({

      windowKey: w.windowKey,
      title: w.title || t().newWindow,
      createdAt: w.createdAt || Date.now(),
      updatedAt: w.updatedAt || Date.now(),
      done: !!w.done,

function readJSONStorage(key){
  try {
    const value = localStorage.getItem(key);
    return value ? JSON.parse(value) : null;
  } catch(e) {
    return null;
  }
}
function legacyWindowFromProject(project){
  if (!project || typeof project !== 'object') return null;
  const history = Array.isArray(project.history) ? project.history : [];
  const hasContent =
    history.length ||
    project.plan ||
    project.spec ||
    (project.intent && project.intent.标题);
  if (!hasContent) return null;
  return {
    title: project.title || (project.intent && project.intent.标题) || t().newWindow,
    createdAt: Number(project.createdAt) || Date.now(),
    updatedAt: Number(project.updatedAt) || Date.now(),
    history,
    intent: project.intent || emptyIntent(),
    done: !!project.done,
    plan: project.plan || null,
    spec: project.spec || null,
  };
}
function collectLegacyWindows(){
  const imported = [];
  const seen = new Set();
  const push = (project) => {
    const win = legacyWindowFromProject(project);
    if (!win) return;
    const signature = JSON.stringify({
      title: win.title,
      createdAt: win.createdAt,
      history: win.history,
      intent: win.intent,
      plan: win.plan,
      spec: win.spec,
    });
    if (seen.has(signature)) return;
    seen.add(signature);
    imported.push(win);
  };

  const workspaceV1 = readJSONStorage('lushu_workspace_v1');
  if (workspaceV1 && Array.isArray(workspaceV1.projects)) workspaceV1.projects.forEach(push);

  const indexV1 = readJSONStorage('lushu_window_index_v1');
  if (indexV1 && Array.isArray(indexV1.windows)) {
    indexV1.windows.forEach(meta => push(readJSONStorage('lushu_window_v1:' + (meta.id || meta.windowKey))));
  }

  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('lushu_window_v1:')) push(readJSONStorage(key));
  }

  push(readJSONStorage('lushu_v1'));
  // 兼容早期原型的旧本地存储键，迁移一次后后端统一按 windowKey 存。
  push(readJSONStorage('wendao_v1'));
  return imported;
}
async function importLegacyWindowsOnce(){
  if (!window.localStorage || localStorage.getItem('lushu_backend_imported_v1') === '1') return null;
  const windows = collectLegacyWindows();
  if (!windows.length) {
    localStorage.setItem('lushu_backend_imported_v1', '1');
    return null;
  }
  const data = await api.importWindows({ windows });
  if (data.error) throw new Error(data.error);
  localStorage.setItem('lushu_backend_imported_v1', '1');
  return data;
}
async function loadWindows(){
  const migrated = await importLegacyWindowsOnce();
  if (migrated && migrated.index) {
    workspace = normalizeIndexFromServer(migrated.index);

  workspace = normalizeIndexFromServer(data.index || index);
  state = normalizeWindowFromServer(data.window);
  renderCurrentProject();
}

function mdToHtml(md){
  let h = escapeHtml(md);
  h = h.replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>');
  h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h = h.replace(/^[-*] (.*)$/gm,'<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>)(?!\s*<li>)/g,'<ul>$1</ul>');
  h = h.replace(/^\d+\. (.*)$/gm,'<li>$1</li>');
  h = h.split(/\n{2,}/).map(b => /^<(h\d|ul|li)/.test(b.trim()) ? b : (b.trim()? '<p>'+b.replace(/\n/g,'<br>')+'</p>':'')).join('\n');
  return h;
}

function openModelView(){
  document.getElementById('modelView').classList.add('show');
  if (!modelConfig.profiles.length) addOpenAIModel();
  editingModelId = editingModelId || modelConfig.activeId;
  renderPresetGrid();
  renderModelList();
  fillModelForm();
}

function closeModelView(){
  document.getElementById('modelView').classList.remove('show');
}

function renderModelList(){
  const wrap = document.getElementById('modelList');
  if (!wrap) return;
  wrap.innerHTML = '';
  modelConfig.profiles.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'model-item' + (p.id === editingModelId ? ' active' : '');
    btn.innerHTML = '<b>' + escapeHtml(p.name) + (p.id === modelConfig.activeId ? ' ✓' : '') + '</b><span>' + escapeHtml(modelDesc(p)) + '</span>';
    btn.onclick = () => {
      commitModelForm();
      editingModelId = p.id;
      renderModelList();
      fillModelForm();
    };
    wrap.appendChild(btn);
  });
}

function renderPresetGrid(){
  const wrap = document.getElementById('presetGrid');
  if (!wrap) return;
  wrap.innerHTML = '';
  MODEL_PRESETS.forEach(preset => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.innerHTML = '<b>' + escapeHtml(preset.name) + '</b><span>' + escapeHtml(preset.model) + '</span>';
    btn.title = preset.baseUrl + ' · ' + preset.note;
    btn.onclick = () => applyModelPreset(preset);
    wrap.appendChild(btn);
  });
}

function applyModelPreset(preset){
  let p = editingModel();
  if (!p) {
    addOpenAIModel();
    p = editingModel();
  }
  p.name = preset.name;
  p.provider = 'openai-compatible';
  p.baseUrl = preset.baseUrl;
  p.model = preset.model;
  if (preset.id === 'ollama') p.apiKey = '';
  fillModelForm();
  renderModelList();
}

function modelDesc(p){
  return (p.baseUrl || t().modelAddressMissing) + ' · ' + (p.model || t().modelNameMissing);
}

function fillModelForm(){
  const p = editingModel();
  if (!p) return;
  document.getElementById('modelName').value = p.name || '';
  document.getElementById('modelProvider').value = 'openai-compatible';
  document.getElementById('modelBaseUrl').value = p.baseUrl || '';
  document.getElementById('modelApiKey').value = '';
  document.getElementById('modelApiKey').placeholder = p.hasApiKey
    ? t().apiKeyKeepPlaceholder
    : t().apiKeyPlaceholder;
  document.getElementById('modelModel').value = p.model || '';
  renderModelFields();
}

function renderModelFields(){
  document.getElementById('openaiFields').style.display = '';
}

function commitModelForm(){
  const p = editingModel();
  if (!p) return;
  p.name = document.getElementById('modelName').value.trim() || t().modelNameFallback;
  p.provider = 'openai-compatible';
  p.model = document.getElementById('modelModel').value.trim();
  p.baseUrl = document.getElementById('modelBaseUrl').value.trim();
  const key = document.getElementById('modelApiKey').value.trim();
  if (key) p.apiKey = key;
  delete p.claudeCommand;
}

function addOpenAIModel(){
  commitModelForm();
  const id = 'custom-' + Date.now().toString(36);
  modelConfig.profiles.push({
    id,
    name: t().newBrain,
    provider: 'openai-compatible',
    baseUrl: '',
    apiKey: '',
    model: '',
  });
  editingModelId = id;
  renderModelList();
  fillModelForm();
}

function setActiveModel(){
  commitModelForm();
  modelConfig.activeId = editingModelId;
  renderModelPill();
  renderModelList();
}

function removeModel(){
  if (modelConfig.profiles.length <= 1) {
    alert(t().keepOneBrain);
    return;
  }
  const p = editingModel();
  if (!p || !confirm(t().deleteBrainConfirm(p.name))) return;
  modelConfig.profiles = modelConfig.profiles.filter(item => item.id !== p.id);
  if (modelConfig.activeId === p.id) modelConfig.activeId = modelConfig.profiles[0].id;
  editingModelId = modelConfig.activeId;
  renderModelPill();
  renderModelList();
  fillModelForm();
}

async function saveModelsFromView(){
  commitModelForm();
  for (const p of modelConfig.profiles) {
    if (!p.baseUrl || !p.model) {
      editingModelId = p.id;
      renderModelList();
      fillModelForm();
      alert((p.name || t().modelNameFallback) + '：' + (!p.baseUrl ? t().modelAddressMissing : t().modelNameMissing));
      return;
    }
  }
  try {
    const data = await api.saveModels(modelConfig);
    if (data.error) throw new Error(data.error);
    modelConfig = data;
    editingModelId = modelConfig.activeId;
    renderModelPill();
    renderModelList();
    fillModelForm();
    closeModelView();
  } catch(e) {
    alert(e.message);
  }
}

// 恢复当前项目
applyLanguage();
loadWindows().catch(e => {
  addMsg('bot', t().windowOpenError(e.message));
});
loadAppInfo();
loadModels();
if (state.plan) { /* 有历史计划书时不自动弹出，finale 按钮可再生成 */ }
</script>
